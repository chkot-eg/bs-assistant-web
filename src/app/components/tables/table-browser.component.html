<eg-page>
  <eg-header variant="page">
    <eg-header-title>Table Browser</eg-header-title>
    <eg-header-detail>Browse and search database tables</eg-header-detail>
  </eg-header>

  <eg-page-body>
    <eg-section>
      <eg-section-content>
        <div class="search-row">
          <eg-form-field-base
            class="search-field"
            [control]="searchControl"
            placeholder="Enter table name or keyword..."
            label="Search tables">
          </eg-form-field-base>
          <eg-form-field-select
            class="library-field"
            [control]="libraryControl"
            [options]="libraryOptions"
            label="Library">
          </eg-form-field-select>
          <eg-button variant="primary" [disabled]="isLoading" (clicked)="onSearch()">
            <eg-icon name="search" size="small"></eg-icon>
            Search
          </eg-button>
          @if (searchControl.value) {
            <eg-button variant="text-muted" (clicked)="clearSearch()">
              <eg-icon name="close" size="small"></eg-icon>
              Clear
            </eg-button>
          }
        </div>
      </eg-section-content>
    </eg-section>

    @if (isLoading) {
      <div class="loading-container">
        <eg-progress-spinner [diameter]="48"></eg-progress-spinner>
        <p>Loading tables...</p>
      </div>
    } @else if (filteredTables.length > 0) {
      <div class="results-info">
        <eg-chip>{{ totalRows }} table(s) found</eg-chip>
      </div>

      <eg-section>
        <eg-table-v2 [columns]="tableColumns" [data]="filteredTables">
          <eg-table-v2-pagination [pageSize]="25"></eg-table-v2-pagination>
        </eg-table-v2>
      </eg-section>
    } @else {
      <div class="empty-state">
        <eg-icon name="table_chart" size="large"></eg-icon>
        <h3>No tables found</h3>
        <p>Try adjusting your search query or library selection.</p>
      </div>
    }
  </eg-page-body>
</eg-page>
