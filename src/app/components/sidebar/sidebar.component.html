<div class="sidebar">
  <!-- Navigation Section (only in /security/* routes) -->
  @if (showNav) {
    <div class="nav-section">
      <div class="nav-header">Navigation</div>
      @for (nav of navItems; track nav.route) {
        <a [routerLink]="nav.route" routerLinkActive="active" class="nav-item">
          <mat-icon class="nav-icon">{{ nav.icon }}</mat-icon>
          <span class="nav-label">{{ nav.label }}</span>
        </a>
      }
    </div>

    <div class="nav-divider"></div>
  }

  <!-- ERP Shortcuts -->
  <div class="shortcut-list">
    @for (item of shortcuts; track item.key) {
      <button class="shortcut-btn">
        <span class="shortcut-key">{{ item.key }}</span>
        <span class="shortcut-separator">-</span>
        <span class="shortcut-label">{{ item.label }}</span>
      </button>
    }
  </div>

  <div class="sidebar-footer">
    <button class="tilbake-btn">Tilbake</button>
  </div>
</div>
