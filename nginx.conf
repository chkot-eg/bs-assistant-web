server {
    listen 4200;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets (JS, CSS, fonts, images)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # TTS audio responses (binary, needs buffering unlike SSE)
    location /api/v1/tts/ {
        # Handle CORS preflight at nginx level (before Spring Security)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, X-Session-ID' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 3600;
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://10.30.9.130:15070;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Strip Origin header so Spring doesn't treat this as a CORS request
        proxy_set_header Origin '';

        # Add CORS headers to actual response
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        proxy_buffering on;
        proxy_read_timeout 30s;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://10.30.9.130:15070;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (agentic streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # Proxy actuator for health checks / metrics
    location /actuator/ {
        proxy_pass http://10.30.9.130:15070;
        proxy_set_header Host $host;
    }

    # Swagger UI passthrough
    location /swagger-ui {
        proxy_pass http://10.30.9.130:15070;
        proxy_set_header Host $host;
    }

    location /v3/api-docs {
        proxy_pass http://10.30.9.130:15070;
        proxy_set_header Host $host;
    }

    # Angular SPA routing - serve index.html for all unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}